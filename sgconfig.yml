# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/sgconfig.json

# Rule directories - organized by scope
ruleDirs:
  - rules/shared # Rules for all TypeScript code
  - rules/effect # Effect library patterns

# Test configuration
testConfigs:
  - testDir: rule-tests/shared
  - testDir: rule-tests/effect

# Treat .ts files as TSX for unified rule handling
languageGlobs:
  tsx: ["*.ts", "*.tsx"]
