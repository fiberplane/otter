# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-interpolated-logging
language: tsx
severity: error
message: "Use static log messages with structured fields (no template interpolation in logger calls)"

rule:
  any:
    # Generic logger methods (winston, pino, etc.)
    - all:
        - pattern: $LOGGER.debug($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: $LOGGER.debug($LEFT + $RIGHT)
    - all:
        - pattern: $LOGGER.info($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: $LOGGER.info($LEFT + $RIGHT)
    - all:
        - pattern: $LOGGER.warn($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: $LOGGER.warn($LEFT + $RIGHT)
    - all:
        - pattern: $LOGGER.error($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: $LOGGER.error($LEFT + $RIGHT)
    # Effect logging functions
    - all:
        - pattern: Effect.log($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: Effect.log($LEFT + $RIGHT)
    - all:
        - pattern: Effect.logInfo($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: Effect.logInfo($LEFT + $RIGHT)
    - all:
        - pattern: Effect.logWarning($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: Effect.logWarning($LEFT + $RIGHT)
    - all:
        - pattern: Effect.logError($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: Effect.logError($LEFT + $RIGHT)
    - all:
        - pattern: Effect.logDebug($A)
        - has: { kind: template_substitution, stopBy: end }
    - pattern: Effect.logDebug($LEFT + $RIGHT)

files:
  - "apps/**/*.ts"
  - "apps/**/*.tsx"
  - "packages/**/*.ts"
  - "packages/**/*.tsx"

note: |
  Prefer:
  - logger.info("Issue updated", { issueId, status })
  - logger.error("Issue update failed", { issueId, error })

  Avoid:
  - logger.info(`Issue ${issueId} updated`)
  - logger.error("Issue " + issueId + " failed")

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/node_modules/**"
