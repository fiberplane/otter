# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-node-or-bun-in-core
language: tsx
severity: error
message: "Core packages must be runtime-agnostic: avoid node: imports and Bun globals"

rule:
  any:
    - kind: import_statement
      has:
        kind: string
        regex: "node:"
    - pattern: Bun.$_

files:
  - "apps/**/*.ts"
  - "apps/**/*.tsx"
  - "packages/**/*.ts"
  - "packages/**/*.tsx"

note: |
  Core packages should be runtime-agnostic when shared across multiple runtimes.
  Use @effect/platform abstractions instead of direct Node.js or Bun APIs.

  - node:fs -> Effect FileSystem service
  - node:path -> @effect/platform/Path
  - node:child_process -> @effect/platform/Command
  - node:crypto -> Effect-compatible crypto
  - Bun.serve -> platform HttpServer abstraction
  - Bun.file -> Effect FileSystem service

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/node_modules/**"
  - "**/test-utils/**"
