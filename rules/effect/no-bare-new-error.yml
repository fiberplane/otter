# yaml-language-server: $schema=https://raw.githubusercontent.com/ast-grep/ast-grep/main/schemas/typescript_rule.json

id: no-bare-new-error
language: tsx
severity: error
message: "Use tagged/domain errors instead of bare new Error(...)"

rule:
  any:
    - pattern: new Error($$$ARGS)
    - pattern: new TypeError($$$ARGS)
    - pattern: new RangeError($$$ARGS)
    - pattern: new ReferenceError($$$ARGS)
    - pattern: new SyntaxError($$$ARGS)
    - pattern: new URIError($$$ARGS)
    - pattern: new EvalError($$$ARGS)

files:
  - "apps/**/*.ts"
  - "apps/**/*.tsx"
  - "packages/**/*.ts"
  - "packages/**/*.tsx"

note: |
  Don't construct built-in Error types in Effect code. Errors are either:
  - **Tagged** (known/handled): Data.TaggedError with typed fields, catchable via Effect.catchTag
  - **Unknown** (unexpected): let them propagate as UnknownException

  Example:
  ```typescript
  // ❌ Bad
  Effect.fail(new Error("No VCS detected"));
  throw new TypeError("Expected string");

  // ✅ Good — tagged error for known failure
  Effect.fail(new NoVcsDetectedError());

  // ✅ Good — unknown failures propagate naturally
  Effect.try(() => riskyOperation());
  ```

ignores:
  - "**/*.test.ts"
  - "**/*.spec.ts"
  - "**/node_modules/**"
