id: no-runpromise-in-effect

valid:
  - |
    Effect.gen(function* () {
      const result = yield* someEffect;
      return result;
    });
  - |
    // Runtime.runPromise is fine at boundaries
    app.get("/api/data", async (c) => {
      const runtime = c.get("runtime");
      return Runtime.runPromise(runtime)(getDataEffect);
    });
  - |
    const result = yield* Effect.flatMap(
      someEffect,
      (data) => Effect.succeed(data)
    );

invalid:
  - |
    Effect.gen(function* () {
      const result = await Effect.runPromise(someEffect);
      return result;
    });
  - |
    const data = Effect.runSync(myEffect);
  - |
    Effect.gen(function* () {
      const x = yield* step1;
      const y = Effect.runPromise(step2);
      return { x, y };
    });
  - |
    async function processData() {
      const result = await Effect.runPromise(
        Effect.gen(function* () {
          return yield* fetchData();
        })
      );
      return result;
    }
